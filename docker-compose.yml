version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dem_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dem_db
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_URL: http://clickhouse:8123
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - clickhouse

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api

  metrics-worker:
    build: ./apps/metrics-engine
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dem_db
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_URL: http://clickhouse:8123
    depends_on:
      - db
      - redis
      - clickhouse
